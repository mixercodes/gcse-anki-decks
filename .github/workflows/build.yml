name: Build CrowdAnki deck

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.py'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build deck
        run: python3 build.py

      - name: Count cards
        run: |
          python3 -c "
          import json
          with open('deck/GCSE Revision.json') as f:
              data = json.load(f)
          def count(d):
              n = len(d.get('notes', []))
              for c in d.get('children', []):
                  n += count(c)
              return n
          print(f'Total cards: {count(data)}')
          "

      - name: Commit built deck
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deck/
          git diff --staged --quiet || git commit -m "Build deck [skip ci]"
          git push
