name: Build CrowdAnki deck

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "build.py"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: python3 build.py

      - name: Commit updated deck JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gcse-anki-decks.json
          git diff --cached --quiet || git commit -m "Auto-build deck JSON [skip ci]"
          git push
